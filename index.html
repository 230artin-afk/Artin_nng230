<script>

const BIN_ID = "6a5d154bda38895dfe7315cd";


async function loadPlan(){

try{

let res = await fetch(
`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`
);

let data = await res.json();

document.getElementById("plan").innerText =
data.record.plan;

}

catch(e){

document.getElementById("plan").innerText =
"خطا در دریافت برنامه";

}

}


loadPlan();

// ===== CHAT SUPABASE =====

const SUPABASE_URL = "https://cqxueguuqmyryttbppcb.supabase.co";

const SUPABASE_KEY = "sb_publishable_93n_d6h9xvNtVf73_UT0ZA_gW14NFX0";

let currentUser = null;


async function loginEmail(){

let email =
document.getElementById("email").value;


if(!email){
alert("ایمیل را وارد کن");
return;
}


let res = await fetch(
SUPABASE_URL + "/auth/v1/otp",
{
method:"POST",

headers:{
"Content-Type":"application/json",
"apikey":SUPABASE_KEY
},

body:JSON.stringify({
  email: email,
  options: {
    emailRedirectTo: "https://230artin-afk.github.io/Artin_nng230/"
  }
})

});


if(res.ok){

document.getElementById("loginStatus").innerHTML =
"✅ لینک ورود ارسال شد، ایمیل خود را چک کنید";

}

else{

alert("خطا در ارسال لینک");

}

}



function logout(){

localStorage.removeItem("token");

location.reload();

}


async function loadMessages(){

let res = await fetch(
SUPABASE_URL + "/rest/v1/messages?select=*&order=id.asc",
{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
}
}
);


let data = await res.json();


let chat = document.getElementById("chat");

chat.innerHTML="";


data.forEach(m=>{

chat.innerHTML += `

<div class="msg">

<div class="name"
style="${m.is_admin ? "color:#ff0000;font-weight:bold;" : ""}">

${m.is_admin ? "🛡️👑 " : ""}

${m.username}

${m.is_admin ? " 🔥 ADMIN" : ""}

</div>

${m.message}

<div class="time">
${new Date(m.created_at).toLocaleString("fa")}
</div>

</div>

`;

});


chat.scrollTop = chat.scrollHeight;

}



async function sendMessage(){

if(!currentUser){

alert("اول وارد شوید");

return;

}


let username =
currentUser.email.split("@")[0];


let message =
document.getElementById("message").value;


if(!message){
alert("پیام را وارد کن");
return;
}

await fetch(
SUPABASE_URL + "/rest/v1/messages",
{

method:"POST",

headers:{
"Content-Type":"application/json",
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
},

body:JSON.stringify({

username:username,

message:message

})

});


document.getElementById("message").value="";


loadMessages();

}



async function checkLogin(){

let token = localStorage.getItem("token");

if(!token){
return;
}


let res = await fetch(
SUPABASE_URL + "/auth/v1/user",
{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + token
}
}
);


if(res.ok){

currentUser = await res.json();


document.getElementById("message").disabled=false;

document.getElementById("sendBtn").disabled=false;


document.getElementById("loginStatus").innerHTML =
"✅ وارد شده: " + currentUser.email.split("@")[0];


}

}

checkLogin();


loadMessages();

setInterval(loadMessages,3000);

</script>
