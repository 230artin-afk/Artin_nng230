<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARTIN_NNG Gaming</title>

<style>
body{
    margin:0;
    background:#050505;
    color:white;
    font-family:tahoma;
    text-align:center;
}

body:before{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(circle,#00ffff55 2px,transparent 3px);
    background-size:55px 55px;
    animation:bg 15s linear infinite;
    z-index:-1;
}

@keyframes bg{
    from{background-position:0 0}
    to{background-position:-400px -400px}
}

.box{
    width:90%;
    max-width:600px;
    margin:25px auto;
    padding:20px;
    background:#111c;
    border-radius:20px;
    box-shadow:0 0 25px #00ffff55;
}

h1,h2{
    color:#00ffff;
}

a{
    display:block;
    margin:12px;
    padding:15px;
    background:#00ffff;
    color:black;
    text-decoration:none;
    border-radius:15px;
    font-weight:bold;
}


/* CHAT */

.chat{
height:350px;
overflow-y:auto;
background:#111;
border-radius:15px;
padding:10px;
text-align:right;
}

.msg{
background:#00ffff;
color:black;
padding:10px;
border-radius:15px;
margin:8px;
}

.name{
font-size:12px;
font-weight:bold;
}

.time{
font-size:10px;
opacity:.7;
}


.chat input{

width:80%;
padding:12px;
border-radius:20px;
border:none;
margin:5px;

}


.chat button{

padding:12px 20px;
border:none;
border-radius:20px;
background:#00ffff;
cursor:pointer;

}

</style>

</head>

<body>

<h1>ARTIN_NNG</h1>
<p>🎮 Gaming • Minecraft • Resource Pack</p>


<div class="box">

<h2>🌐 شبکه‌های اجتماعی</h2>

<a href="https://rubika.ir/Artin_nng">
روبیکا ARTIN_NNG
</a>

<a href="bale://ble.ir/Artin_nng">
بله ARTIN_NNG
</a>

<a href="bale://ble.ir/Minecraft230">
ریسورس پک بله
</a>

<a href="https://rubika.ir/minecraft230t">
ریسورس پک روبیکا
</a>

</div>


<div class="box">

<h2>📅 برنامه روز</h2>

<p id="plan">
در حال دریافت...
</p>

</div>
<!-- چت عمومی -->

<div class="box">

<h2>💬 چت عمومی ARTIN_NNG</h2>

<div id="chat" class="chat">

در حال دریافت پیام‌ها...

</div>


<input 
id="username"
placeholder="نام شما">


<input 
id="message"
placeholder="پیام شما">


<button onclick="sendMessage()">
ارسال
</button>

</div>


<script>

const BIN_ID = "6a5d154bda38895dfe7315cd";


async function loadPlan(){

try{

let res = await fetch(
`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`
);

let data = await res.json();

document.getElementById("plan").innerText =
data.record.plan;

}

catch(e){

document.getElementById("plan").innerText =
"خطا در دریافت برنامه";

}

}


loadPlan();

// ===== CHAT SUPABASE =====

const SUPABASE_URL = "https://cqxueguuqmyryttbppcb.supabase.co";

const SUPABASE_KEY = "sb_publishable_93n_d6h9xvNtVf73_UT0ZA_gW14NFX0";


async function loadMessages(){

let res = await fetch(
SUPABASE_URL + "/rest/v1/messages?select=*&order=id.asc",
{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
}
}
);


let data = await res.json();


let chat = document.getElementById("chat");

chat.innerHTML="";


data.forEach(m=>{

chat.innerHTML += `

<div class="msg">

<div class="name">
${m.username}
</div>

${m.message}

<div class="time">
${new Date(m.created_at).toLocaleString("fa")}
</div>

</div>

`;

});


chat.scrollTop = chat.scrollHeight;

}



async function sendMessage(){

let username =
document.getElementById("username").value;

let message =
document.getElementById("message").value;


if(!username || !message){
alert("نام و پیام را وارد کن");
return;
}


await fetch(
SUPABASE_URL + "/rest/v1/messages",
{

method:"POST",

headers:{
"Content-Type":"application/json",
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
},

body:JSON.stringify({

username:username,

message:message

})

});


document.getElementById("message").value="";


loadMessages();

}



loadMessages();

setInterval(loadMessages,3000);

</script>


</body>
</html>
