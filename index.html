<body>

<script>

window.addEventListener("load",()=>{
    localStorage.removeItem("token");
});

const BIN_ID = "6a5d154bda38895dfe7315cd";


async function loadPlan(){

try{

let res = await fetch(
`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`
);

let data = await res.json();

document.getElementById("plan").innerText =
data.record.plan;

}

catch(e){

document.getElementById("plan").innerText =
"خطا در دریافت برنامه";

}

}


loadPlan();

// ===== CHAT SUPABASE =====

const SUPABASE_URL = "https://cqxueguuqmyryttbppcb.supabase.co";

const SUPABASE_KEY = "sb_publishable_93n_d6h9xvNtVf73_UT0ZA_gW14NFX0";

let currentUser = null;


async function signUp(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;


if(!email || !password){

alert("ایمیل و رمز را وارد کن");

return;

}


let res = await fetch(
SUPABASE_URL + "/auth/v1/signup",
{
method:"POST",

headers:{
"Content-Type":"application/json",
"apikey":SUPABASE_KEY
},

body:JSON.stringify({
email:email,
password:password
})

});


if(res.ok){

alert("ثبت نام موفق شد ✅");

let userData = await res.json();

await fetch(
SUPABASE_URL + "/rest/v1/profile",
{
method:"POST",

headers:{
"Content-Type":"application/json",
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
},

body:JSON.stringify({
id:userData.user.id,
email:email,
username:email.split("@")[0],
banned:false
})
});

await signIn();

}

else{
let error = await res.text();
alert(error);
}

}



async function signIn(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;


let res = await fetch(
SUPABASE_URL + "/auth/v1/token?grant_type=password",
{
method:"POST",

headers:{
"Content-Type":"application/json",
"apikey":SUPABASE_KEY
},

body:JSON.stringify({
email:email,
password:password
})

});


let data = await res.json();


if(data.access_token){

let userRes = await fetch(
SUPABASE_URL + "/auth/v1/user",
{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + data.access_token
}
}
);

let user = await userRes.json();


let banRes = await fetch(
SUPABASE_URL +
"/rest/v1/profile?email=eq." +
encodeURIComponent(user.email) +
"&select=banned",
{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
}
}
);


let banData = await banRes.json();


if(banData.length > 0 && banData[0].banned){

alert("⛔ این حساب توسط ادمین بن شده است.");

return;

}

localStorage.setItem(
"token",
data.access_token
);

alert("ورود موفق شد ✅");

location.reload();

}

else{

alert("ایمیل یا رمز اشتباه است");

}

}



function logout(){

localStorage.removeItem("token");

location.reload();

}


async function loadMessages(){

let res = await fetch(
SUPABASE_URL + "/rest/v1/messages?select=*&order=id.asc",
{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + localStorage.getItem("token")
}
}
);


let data = await res.json();

if(!Array.isArray(data)){
    console.log("خطای دریافت پیام:", data);
    return;
}

let chat = document.getElementById("chat");

chat.innerHTML="";


data.forEach(m=>{

chat.innerHTML += `

<div class="msg">

<div class="name"
style="${m.is_admin ? "color:#ff0000;font-weight:bold;" : ""}">

${m.is_admin ? "🛡️👑 " : ""}

${m.username}

${m.is_admin ? " 🔥 ADMIN" : ""}

</div>

${m.message}

<div class="time">
${new Date(m.created_at).toLocaleString("fa")}
</div>

</div>

`;

});


chat.scrollTop = chat.scrollHeight;

}



async function sendMessage(){

if(!currentUser){

alert("اول وارد شوید");

return;

}


let username =
currentUser.email.split("@")[0];


let message =
document.getElementById("message").value;


if(!message){
alert("پیام را وارد کن");
return;
}

await fetch(
SUPABASE_URL + "/rest/v1/messages",
{

method:"POST",

headers:{
"Content-Type":"application/json",
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + localStorage.getItem("token")
},

body:JSON.stringify({

username:username,

message:message

})

});


document.getElementById("message").value="";


loadMessages();

}



async function checkLogin(){

let token = localStorage.getItem("token");

if(!token){
return;
}


let res = await fetch(
SUPABASE_URL + "/auth/v1/user",
{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + token
}
}
);


if(res.ok){

currentUser = await res.json();


document.getElementById("message").disabled=false;

document.getElementById("sendBtn").disabled=false;


document.getElementById("loginStatus").innerHTML =
"✅ وارد شده: " + currentUser.email.split("@")[0];

}

}

function openProfile(){

document.getElementById("profilePage").style.display="block";

document.getElementById("profileName").innerHTML =
"نام کاربری: " + currentUser.email.split("@")[0];

}


function closeProfile(){

document.getElementById("profilePage").style.display="none";

}



async function changePassword(){

let oldPass =
document.getElementById("oldPassword").value;

let newPass =
document.getElementById("newPassword").value;


let email=currentUser.email;


// بررسی رمز قبلی
let login = await fetch(
SUPABASE_URL+"/auth/v1/token?grant_type=password",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"apikey":SUPABASE_KEY
},
body:JSON.stringify({
email:email,
password:oldPass
})
});


let loginData=await login.json();


if(!loginData.access_token){

document.getElementById("changeStatus").innerHTML=
"❌ رمز فعلی اشتباه است";

return;

}


// تغییر رمز

let update=await fetch(
SUPABASE_URL+"/auth/v1/user",
{
method:"PUT",

headers:{
"Content-Type":"application/json",
"apikey":SUPABASE_KEY,
"Authorization":
"Bearer "+loginData.access_token
},

body:JSON.stringify({
password:newPass
})

});


if(update.ok){

document.getElementById("changeStatus").innerHTML=
"✅ رمز با موفقیت تغییر کرد";

}

else{

document.getElementById("changeStatus").innerHTML=
"❌ خطا در تغییر رمز";

}

}

async function checkBanStatus(){

    if(!currentUser) return;

    let res = await fetch(
        SUPABASE_URL +
        "/rest/v1/profile?email=eq." +
        encodeURIComponent(currentUser.email) +
        "&select=banned",
        {
            headers:{
                "apikey":SUPABASE_KEY,
                "Authorization":"Bearer " + SUPABASE_KEY
            }
        }
    );

    let data = await res.json();

    if(data.length > 0 && data[0].banned){

        await logout();

        alert("⛔ حساب شما توسط ادمین بن شده است.");

        return;
    }

}

checkLogin();


loadMessages();


setInterval(loadMessages,3000);

setInterval(checkBanStatus,5000);

</script>
