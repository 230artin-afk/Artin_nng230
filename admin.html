<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARTIN_NNG Admin</title>

<style>

body{
    background:#050505;
    color:white;
    font-family:tahoma;
    text-align:center;
    padding:30px;
}

.box{
    max-width:500px;
    margin:auto;
    background:#111c;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 25px #00ffff55;
}

h1,h2{
    color:#00ffff;
}

input,textarea,button{
    width:90%;
    padding:15px;
    margin:10px;
    border-radius:15px;
    border:none;
}

button{
    background:#00ffff;
    font-weight:bold;
    cursor:pointer;
}

textarea{
    height:150px;
}

#panel{
    display:none;
}

</style>

</head>


<body>


<div class="box">

<h1>ARTIN_NNG</h1>

<h2>🔐 مدیریت</h2>


<input id="password" type="password" placeholder="رمز ورود">

<button onclick="login()">
ورود
</button>



<div id="panel">

<h2>📅 تغییر برنامه روز</h2>


<textarea id="plan" placeholder="برنامه جدید"></textarea>


<button onclick="savePlan()">
ذخیره برای همه
</button>


</div>


</div>



<script>


const BIN_ID = "6a5d154bda38895dfe7315cd";

const API_KEY = "$2a$10$0zLs15Pn604pQp3kO73ZaOVHLUR/Qtn67BtuSxFtTB3rogR3pTEku"


function login(){

let pass =
document.getElementById("password").value;


if(pass=="6219"){

document.getElementById("panel").style.display="block";

alert("ورود موفق");

}

else{

alert("رمز اشتباه است");

}

}



async function savePlan(){


let text =
document.getElementById("plan").value;


let response = await fetch(
`https://api.jsonbin.io/v3/b/${BIN_ID}`,
{
method:"PUT",

headers:{
"Content-Type":"application/json",
"X-Master-Key":API_KEY
},

body:JSON.stringify({

plan:text

})

});


if(response.ok){

alert("برنامه برای همه ذخیره شد ✅");

}

else{

alert("خطا در ذخیره");

}


}


</script>


</body>

</html>
