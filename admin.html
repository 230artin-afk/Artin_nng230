<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARTIN_NNG Admin</title>

<style>

body{
    background:#050505;
    color:white;
    font-family:tahoma;
    text-align:center;
    padding:30px;
}

.box{
    max-width:500px;
    margin:auto;
    background:#111c;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 25px #00ffff55;
}

h1,h2{
    color:#00ffff;
}

input,textarea,button{
    width:90%;
    padding:15px;
    margin:10px;
    border-radius:15px;
    border:none;
}

button{
    background:#00ffff;
    font-weight:bold;
    cursor:pointer;
}

textarea{
    height:150px;
}

#panel{
    display:none;
}

.chatbox{
    max-height:400px;
    overflow-y:auto;
    background:#111;
    padding:10px;
    border-radius:15px;
}

.chatmsg{
    background:#00ffff;
    color:black;
    padding:10px;
    margin:10px;
    border-radius:15px;
}

.delete{
    background:red;
    color:white;
    padding:8px;
    width:auto;
}

</style>

</head>


<body>


<div class="box">

<h1>ARTIN_NNG</h1>

<h2>🔐 مدیریت</h2>


<input id="password" type="password" placeholder="رمز ورود">

<button onclick="login()">
ورود
</button>



<div id="panel">

<h2>📅 تغییر برنامه روز</h2>


<textarea id="plan" placeholder="برنامه جدید"></textarea>


<button onclick="savePlan()">
ذخیره برای همه
</button>

<h2>💬 مدیریت چت</h2>

<button onclick="loadMessages()">
نمایش پیام‌ها
</button>

<div id="messages" class="chatbox"></div>


</div>


</div>



<script>


const BIN_ID = "6a5d154bda38895dfe7315cd";

const API_KEY = "$2a$10$0zLs15Pn604pQp3kO73ZaOVHLUR/Qtn67BtuSxFtTB3rogR3pTEku"


function login(){

let pass =
document.getElementById("password").value;


if(pass=="6219"){

document.getElementById("panel").style.display="block";

alert("ورود موفق");

}

else{

alert("رمز اشتباه است");

}

}



async function savePlan(){


let text =
document.getElementById("plan").value;


let response = await fetch(
`https://api.jsonbin.io/v3/b/${BIN_ID}`,
{
method:"PUT",

headers:{
"Content-Type":"application/json",
"X-Master-Key":API_KEY
},

body:JSON.stringify({

plan:text

})

});


if(response.ok){

alert("برنامه برای همه ذخیره شد ✅");

}

else{

alert("خطا در ذخیره");

}


}

const SUPABASE_URL =
"https://cqxueguuqmyryttbppcb.supabase.co";

const SUPABASE_KEY =
"sb_publishable_93n_d6h9xvNtVf73_UT0ZA_gW14NFX0";


async function loadMessages(){

let res = await fetch(
SUPABASE_URL+"/rest/v1/messages?select=*&order=id.desc",
{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer "+SUPABASE_KEY
}
}
);


let data = await res.json();

let box=document.getElementById("messages");

box.innerHTML="";


data.forEach(m=>{

box.innerHTML += `

<div class="chatmsg">

<b>${m.username}</b>

<br>

${m.message}

<br>

<small>
${new Date(m.created_at).toLocaleString("fa")}
</small>

<br>

<button class="delete"
onclick="deleteMessage(${m.id})">
🗑 حذف
</button>

</div>

`;

});

}



async function deleteMessage(id){

if(!confirm("این پیام حذف شود؟")) return;


await fetch(
SUPABASE_URL+"/rest/v1/messages?id=eq."+id,
{
method:"DELETE",
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer "+SUPABASE_KEY
}
}
);


loadMessages();

}


</script>


</body>

</html>
